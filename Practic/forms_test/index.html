<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Регистрационная форма</h1>
    <form name="users" action="#" method="post" class="form">
      <fieldset>
        <legend>Сведения о себе</legend>
        <p>Фамилия, Имя: <input type="text" name="FIO" size="20" maxlength="60" /></p>
        <p>Пароль:<input type="password" name="password" size="20" /></p>
        <p>Фотография<input type="hidden" class="photo" accept="image/png image/jpeg" /></p>
        <p>Ваш пол:</p>
        <p>Муж<input type="radio" name="gender" value="m" /></p>
        <p>Жен<input type="radio" name="gender" value="f" /></p>

        <p>Ваше хобби</p>
        <p><input type="checkbox" name="hobby" class="hobby" value="m" /> Музыка</p>
        <p><input type="checkbox" name="hobby" class="hobby" value="r" />Чтение</p>
        <p><input type="checkbox" name="hobby" class="hobby" value="g" />Игры</p>

        <select name="city">
          <option value="52">Нижний новогорд</option>
          <option value="55">Омск</option>
          <option value="77">Москва</option>
          <option value="72">Тюмень</option>
        </select>

        <textarea name="comment"></textarea>
        <input type="reset" value="Отмена" />
        <input type="submit" value="Готово" />
        <p>0<input type="range" min="0" max="100" />100</p>
      </fieldset>
    </form>
  </body>
</html>
