<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprites</title>
    <link rel="stylesheet" href="styles/style.css" />
  </head>
  <body class="sprite">
    <header class="sprite-header">
      <div class="sprite-header__group">
        <p>ист-251</p>
      </div>
      <div class="sprite-header__name">
        <p>Утюганов Сергей Игоревич</p>
      </div>
    </header>

    <main class="sprite-main">
      <section class="sprite-hover sprite-item">
        <p class="sprite-hover__name sprite__name">Hover спрайт</p>
        <div class="sprite-hover__image"></div>
      </section>

      <section class="sprite-linear sprite-item">
        <p class="sprite-linear__name sprite__name">Линейный спрайт</p>
        <div class="sprite-linear__image"></div>
      </section>

      <section class="sprite-array sprite-item">
        <p class="sprite-array__name sprite__name">Матричный спрайт</p>
        <div class="sprite-array__image"></div>
      </section>
    </main>
  </body>
</html>
